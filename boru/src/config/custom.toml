# BORU Custom Configuration
# Place this file at ~/.config/boru/boru.custom.toml
# or use the --config flag to specify a custom path

# SECURITY WARNING: This file controls what BORU allows in CUSTOM mode.
# Use with caution and review all rules carefully.

# Paths that are always allowed (exact match or glob patterns)
allowed_paths = [
    "/tmp/momo/workspace",
    "/home/user/projects/safe/*",
]

# Paths that are always denied (takes precedence over allowed_paths)
denied_paths = [
    "/home/user/.ssh",
    "/home/user/.gnupg",
    "/home/user/.aws",
    "/home/user/.env",
]

# File types always allowed (without dot)
allowed_types = ["txt", "md", "json", "yaml", "toml"]

# File types always denied (takes precedence)
# Windows: exe, dll, bat, cmd, scr, msi
# Linux: so, elf, bin, out, appimage, deb, rpm
# macOS: dylib, app, dmg
denied_types = [
    "exe", "dll", "bat", "cmd", "scr", "msi",
    "so", "elf", "bin", "out", "appimage", "deb", "rpm",
    "dylib", "app", "dmg",
]

# Path-specific rules with detailed configuration
# These are evaluated in order, first match wins

[[path_rules]]
pattern = "/home/user/downloads/*"
action = "prompt"
reason = "Downloaded files require manual review"

[[path_rules]]
pattern = "/tmp/momo/trusted/*"
action = "allow"
reason = "Pre-verified safe workspace"

[[path_rules]]
pattern = "*.wasm"
action = "allow"
reason = "WASM files run in cage"
